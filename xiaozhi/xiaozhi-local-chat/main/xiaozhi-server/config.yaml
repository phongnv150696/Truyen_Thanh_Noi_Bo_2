# ============================================================================
# 🧠 PROMPT TỐI ƯU CHO RAG + MEMORY
# ============================================================================
prompt: 'Bạn là Phong Phong- trợ lý AI thông minh với khả năng ghi nhớ cuộc hội thoại.

  **QUY TẮC TUYỆT ĐỐI:**
  
  1. **TUYỆT ĐỐI CHỈ NÓI TIẾNG VIỆT** - Bất kể đầu vào là gì.
  
  2. **SỬ DỤNG BỘ NHỚ HỘI THOẠI:**
     - NHỚ tên, sở thích, thông tin người dùng đã chia sẻ
     - THAM CHIẾU câu hỏi/nội dung đã nói trước đó
     - DUY TRÌ ngữ cảnh liên tục trong cuộc trò chuyện
  
  3. **ƯU TIÊN NGUỒN THÔNG TIN:**
     a) **Tài liệu RAG** - LUÔN ƯU TIÊN TRƯỚC TIÊN
     b) **Bộ nhớ hội thoại** - If không có trong RAG
     c) **Kiến thức chung** - CHỈ KHI KHÔNG CÓ (a) và (b)
  
  4. **QUY TẮC VÀNG KHI CÓ CONTEXT TỪ TÀI LIỆU (CRITICAL!):**
     
     ⚠️ **BẮT BUỘC:**
     - TRÍCH NGUYÊN VĂN từ tài liệu, KHÔNG tự sáng tác
     - NẾU tài liệu có danh sách → ĐƯA RA TOÀN BỘ danh sách
     - NẾU có số liệu → ĐƯA RA CHÍNH XÁC số liệu
     - NẾU có tên người → ĐƯA RA ĐÚNG TÊN trong tài liệu
     
     ✅ **ĐÚNG:** "Theo tài liệu, 10 lời thề gồm: [liệt kê TOÀN BỘ 10 lời như trong tài liệu]"
     ❌ **SAI:** "10 lời thề là về lòng trung thành..." (chung chung, thiếu chi tiết)
  
  5. **ĐỊNH DẠNG TRẢ LỜI KHI CÓ TÀI LIỆU:**
     
     Format bắt buộc:
     "Theo tài liệu [nguồn]:
     
     [TRÍCH NGUYÊN VĂN nội dung từ context]
     
     - Nếu là danh sách: Liệt kê ĐẦY ĐỦ từng mục
     - Nếu là thông tin người: Họ tên + chức vụ + các chi tiết khác
     - Nếu là quy định: Nêu RÕ RÀNG từng điều khoản"
  
  6. **KHI KHÔNG CÓ THÔNG TIN TRONG TÀI LIỆU:**
     - Nói rõ: "Tôi không tìm thấy thông tin này trong tài liệu"
     - KHÔNG đoán mò hoặc tự sáng tác
     - Đề xuất người dùng cung cấp thêm
  
  7. **PHONG CÁCH:**
     - TẬN TÂM, CHÍNH XÁC, CHI TIẾT
     - Ưu tiên sự ĐÚNG ĐẮN hơn là ngắn gọn
     - Dùng "bạn" thay vì "anh/chị"
  
  8. **LƯU Ý ĐẶC BIỆT VỚI DANH SÁCH (QUAN TRỌNG):**
     - Khi hỏi về danh sách (VD: "6 hình thức", "4 phương pháp"), hãy tìm các TIÊU ĐỀ CHÍNH (thường có đánh số 1, 2, 3... hoặc in đậm ở đầu dòng).
     - CẨN THẬN: KHÔNG được nhầm lẫn với các mục con (bullet points) nằm bên trong.
     - Ví dụ sai lầm cần tránh: Hỏi "6 hình thức", nhưng lại trả lời các mục con của hình thức 1.
  '


prompt_template: agent-base-prompt.txt
end_prompt:
  enable: true
  prompt: 'Cảm ơn bạn đã trò chuyện! Tôi sẽ nhớ những gì chúng ta đã nói. Hẹn gặp lại!'

selected_module:
  VAD: SileroVAD
  ASR: sherpa_provider
  LLM: RAG_OllamaLLM
  TTS: pyttsx3_provider
  Memory: ConversationMemory  # ✅ BẬT MEMORY
  Intent: nointent

VAD:
  SileroVAD:
    type: silero
    threshold: 0.6
    threshold_low: 0.4
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 800  # Increased from 300ms to allow natural pauses

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  sherpa_provider:
    type: sherpa_provider
    model_dir: models/sherpa-onnx-zipformer-vi-int8-2025-04-20
    output_dir: tmp/

LLM:
  OllamaLLM:
    type: ollama
    model_name: gemma2:2b
    base_url: http://localhost:11434
    temperature: 0.4
    max_tokens: 1024
    top_p: 0.9
    
  # ============================================================================
  # ⚡ RAG + MEMORY - THÔNG MINH & NHANH
  # ============================================================================
  RAG_OllamaLLM:
    type: rag
    model_name: "gemma2:2b"
    base_url: http://localhost:11434
    
    # ---- LLM PARAMETERS ----
    temperature: 0.1          # Vinallama needs some temperature for natural output
    max_tokens: 250           # ⬇ RẤT THẤP để buộc vinallama trả lời ngắn
    top_p: 0.85
    repeat_penalty: 1.1
    
    # ---- RAG CORE SETTINGS ----
    rag_enabled: true
    strict_mode: false        # ⬇ ĐỔI sang false - cho phép dùng memory + knowledge
    fallback_to_llm: true     # ⬆ ĐỔI sang true - fallback khi không có doc
    require_sources: false    # ⬇ ĐỔI sang false - không bắt buộc có source
    
    # ---- EMBEDDING & RETRIEVAL ----
    embedding_model: balanced
    cross_encoder: cross-encoder/ms-marco-MiniLM-L-6-v2
    
    # ---- CHUNKING STRATEGY ----
    chunk_size: 600
    chunk_overlap: 150
    chunk_by_sentence: true
    
    # ---- RETRIEVAL PARAMETERS ----
    n_results: 8
    top_k_rerank: 4
    similarity_threshold: 0.75
    min_chunks_required: 1
    max_chunks_in_context: 8  # ⬆ Tăng từ 5 → 8 cho list queries
    
    # ---- HYBRID SEARCH ----
    enable_hybrid_search: true
    hybrid_alpha: 0.8
    
    # ---- CONTEXT MANAGEMENT ----
    max_context_length: 3000
    context_window_strategy: "most_relevant"
    include_metadata: true
    cite_sources: true
    
    # ---- PERFORMANCE & CACHING ----
    # ---- PERFORMANCE & CACHING ----
    enable_cache: true
    cache_size: 500
    cache_ttl: 7200
    enable_semantic_cache: true
    parallel_processing: true
    batch_size: 64
    enable_async_retrieval: true
    
    # ---- QUALITY CONTROL ----
    enable_answer_verification: true
    min_answer_confidence: 0.7
    reject_low_quality: true
    
    # ---- STORAGE ----
    chroma_path: ./data/rag-chroma
    collection_name: xiaozhi_docs
    document_dir: ./data/documents
    
    # ---- VECTOR DATABASE OPTIMIZATION ----
    vector_db_config:
      index_type: "HNSW"
      ef_construction: 200
      ef_search: 100
      M: 32
      enable_index_optimization: true
    
    # ---- METADATA & FILTERING ----
    enable_metadata_filter: true
    metadata_keys: ["source", "page", "section", "date", "category", "author"]
    preserve_document_structure: true
    
    # ---- LOGGING & DEBUGGING ----
    enable_rag_logging: true
    log_retrieved_chunks: true
    log_similarity_scores: true
    log_rerank_scores: true
    log_context_used: true
    
    # ---- ADVANCED SETTINGS ----
    use_mmr: true
    mmr_lambda: 0.7
    enable_query_expansion: true
    query_expansion_method: "hyde"
    enable_query_rewriting: true
    enable_document_preprocessing: true
    remove_duplicates: true
    normalize_scores: true
    
    # ---- ERROR HANDLING ----
    on_no_results: "use_memory_and_knowledge"  # ⬆ ĐỔI - dùng memory khi không có doc
    on_low_confidence: "request_clarification"
    strict_citation: false    # ⬇ ĐỔI sang false - không bắt buộc trích dẫn

TTS:
  pyttsx3_provider:
    type: pyttsx3_provider
    voice: Microsoft An
    rate: 150
    volume: 1.0
    output_dir: tmp/

# ============================================================================
# 🧠 CẤU HÌNH BỘ NHỚ HỘI THOẠI (CONVERSATION MEMORY)
# ============================================================================
Memory:
  # ---- TẮT MEMORY CŨ ----
  nomem:
    type: nomem
  
  # ---- ✅ BẬT MEMORY MỚI - 4 CHIẾN LƯỢC ----
  
  # 🔹 CHIẾN LƯỢC 1: BUFFER MEMORY (Đơn giản nhất)
  # Lưu toàn bộ lịch sử hội thoại
  BufferMemory:
    type: buffer
    max_messages: 20          # Lưu tối đa 20 tin nhắn gần nhất
    include_system_messages: false
    
  # 🔹 CHIẾN LƯỢC 2: SLIDING WINDOW (Cân bằng)  
  # Chỉ giữ N tin nhắn gần nhất
  SlidingWindowMemory:
    type: sliding_window
    window_size: 10           # Giữ 10 tin nhắn gần nhất (5 cặp Q&A)
    overlap: 2                # Overlap 2 tin nhắn để giữ context
    
  # 🔹 CHIẾN LƯỢC 3: SUMMARY MEMORY (Tối ưu nhất - RECOMMEND) ⭐
  # Tóm tắt lịch sử cũ, giữ chi tiết mới
  ConversationMemory:
    type: summary
    max_buffer_messages: 6    # Giữ 6 tin nhắn gần nhất ở dạng chi tiết
    summary_prompt: |
      Tóm tắt cuộc hội thoại sau bằng tiếng Việt, giữ lại:
      - Tên và thông tin cá nhân người dùng
      - Các sở thích, mục tiêu đã đề cập
      - Các câu hỏi quan trọng đã hỏi
      - Ngữ cảnh cần thiết cho cuộc trò chuyện tiếp theo
      
      Hội thoại:
      {history}
      
      Tóm tắt ngắn gọn (2-3 câu):
    trigger_summary_after: 10  # Tóm tắt sau mỗi 10 tin nhắn
    keep_summary_tokens: 500   # Summary không vượt quá 500 tokens
    
  # 🔹 CHIẾN LƯỢC 4: VECTOR MEMORY (Nâng cao nhất)
  # Dùng embedding để tìm phần liên quan trong lịch sử
  VectorMemory:
    type: vector
    embedding_model: "balanced"
    top_k_memories: 5         # Lấy 5 đoạn hội thoại liên quan nhất
    similarity_threshold: 0.7  # Chỉ lấy memories có độ tương đồng > 0.7
    max_memory_tokens: 800    # Tổng memory không vượt quá 800 tokens
    storage_path: ./data/memory-vector-store
    collection_name: conversation_memories
    
    # Metadata filtering
    filter_by_date: true      # Lọc theo thời gian
    recent_days_weight: 7     # Ưu tiên memories trong 7 ngày gần
    
    # Memory optimization
    enable_memory_compression: true  # Nén memories cũ
    compression_ratio: 0.3    # Giữ 30% thông tin quan trọng nhất
    auto_cleanup: true        # Tự động dọn memories cũ
    cleanup_after_days: 30    # Xóa memories > 30 ngày
    
  # ============================================================================
  # 🎯 CHỌN CHIẾN LƯỢC PHÙ HỢP
  # ============================================================================
  # 
  # 📊 So sánh:
  # 
  # | Chiến lược | Tốc độ | Bộ nhớ | Chính xác | Phức tạp | Recommend |
  # |-----------|--------|--------|-----------|----------|-----------|
  # | Buffer    | ⚡⚡⚡   | ❌     | ✅✅      | ⭐       |           |
  # | Window    | ⚡⚡    | ✅     | ✅        | ⭐⭐     |           |
  # | Summary   | ⚡⚡    | ✅✅   | ✅✅      | ⭐⭐⭐   | ⭐⭐⭐    |
  # | Vector    | ⚡     | ✅✅✅ | ✅✅✅    | ⭐⭐⭐⭐ | (nâng cao)|
  # 
  # 🎯 KHUYẾN NGHỊ:
  # - Dùng ConversationMemory (Summary) - Cân bằng tốt nhất
  # - Chuyển sang VectorMemory nếu cần hội thoại dài (>50 messages)
  # 
  # ============================================================================

Intent:
  nointent:
    type: nointent

# ============================================================================
# 💡 VÍ DỤ CÁCH HOẠT ĐỘNG CỦA MEMORY
# ============================================================================
# 
# ❌ TRƯỚC (nomem):
# User: "Tên tôi là An"
# Bot:  "Xin chào! Tôi có thể giúp gì?"
# User: "Tên tôi là gì?"
# Bot:  "Xin lỗi, tôi không biết tên bạn"  ← Quên mất!
# 
# ✅ SAU (ConversationMemory):
# User: "Tên tôi là An"
# Bot:  "Xin chào An! Rất vui được gặp bạn!"
# User: "Tên tôi là gì?"
# Bot:  "Tên bạn là An, như bạn vừa nói với tôi"  ← Nhớ!
# 
# User: "Tôi thích lập trình Python"
# Bot:  "Tuyệt! Tôi có thể giúp bạn với Python"
# User: "Giúp tôi code đi"
# Bot:  "Được thôi An! Về Python, bạn muốn code gì?"  ← Nhớ tên + ngữ cảnh!
# 
# ============================================================================

# ============================================================================
# 📊 TỔNG KẾT CẢI TIẾN
# ============================================================================
# ✅ Tốc độ: 2-3x nhanh hơn (chunking, retrieval, cache)
# ✅ Bộ nhớ: Chatbot nhớ được cuộc hội thoại
# ✅ Thông minh: Kết hợp RAG + Memory + Knowledge
# ✅ Tự nhiên: Trả lời như người thật
# 
# 🎯 KẾT QUẢ:
# - RAG: Trả lời chính xác từ documents
# - Memory: Nhớ thông tin user, ngữ cảnh hội thoại
# - Fallback: Dùng kiến thức chung khi cần
# 
# 🚀 CHATBOT THÔNG MINH & NHANH!
# ============================================================================