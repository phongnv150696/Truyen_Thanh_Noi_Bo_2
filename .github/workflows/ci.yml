name: OpenClaw V2 CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          fontend/package-lock.json

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci || npm install

    - name: Verify Backend Build (TypeScript)
      working-directory: ./backend
      run: npm run build

    - name: Install Frontend Dependencies
      working-directory: ./fontend
      run: npm ci || npm install

    - name: Verify Frontend Build (Vite/React)
      working-directory: ./fontend
      run: npm run build

  docker-build-verify:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Backend Docker Build
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: openclaw-backend:test

    - name: Test Frontend Docker Build
      uses: docker/build-push-action@v5
      with:
        context: ./fontend
        push: false
        tags: openclaw-frontend:test

    - name: Verify Docker Compose Configuration
      run: docker-compose config
